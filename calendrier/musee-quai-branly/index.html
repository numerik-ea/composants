<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Démo – MQBDatePicker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 40px 16px;
      min-height: 100vh;
    }

    h1 { font-size: 1.25rem; color: #333; }

    .demo-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      justify-content: center;
    }

    .trigger-btn {
      background: var(--color, #8B1535);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px 18px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .trigger-btn:focus-visible { outline: 3px solid #0057a8; outline-offset: 2px; }
    .trigger-btn[aria-expanded="true"] { opacity: 0.9; }

    #output {
      font-size: 0.9rem;
      color: #555;
      min-height: 1.4em;
    }
  </style>
</head>
<body>

<h1>Démo MQBDatePicker</h1>

<div class="demo-row">
  <button class="mqb-trigger trigger-btn">
    Choisir une date
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
         aria-hidden="true" focusable="false">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <path d="M16 2v4M8 2v4M3 10h18"/>
    </svg>
  </button>
</div>

<script src="mqb-date-picker.js"></script>
<script>
  const output = document.getElementById('output');

  let selectedStart = null;
  let selectedEnd   = null;

  MQBDatePicker.initAll('.mqb-trigger', {
    breakpoint: 768,
    returnFormat: 'jj/mm/aaaa',
    // onChange(dateObj) {
    //   console.log('Date sélectionnée changée :', dateObj);
    // },cd
    onConfirm(dateObj) {
      console.log('Date sélectionnée confirmée:', dateObj);
    },
  });
</script>

</body>
</html>
